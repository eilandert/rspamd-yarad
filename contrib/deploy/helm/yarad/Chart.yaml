apiVersion: v2
name: yarad
description: >-
  yarad — a single Go HTTP daemon that scans mail content with YARA rules and
  optional abuse.ch threat-intel feeds. Designed as an internal scan backend for
  the rspamd yara.lua plugin (ClusterIP-only, not web-facing).
type: application
# Chart version — bump on chart changes.
version: 0.1.0
# Application version — the yarad release this chart defaults to (image tag).
appVersion: "1.2.0"
home: https://github.com/eilandert/rspamd-yarad
sources:
  - https://github.com/eilandert/rspamd-yarad
keywords:
  - yara
  - rspamd
  - antivirus
  - mail-security
  - threat-intel
maintainers:
  - name: eilandert
    url: https://github.com/eilandert
