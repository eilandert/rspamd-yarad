# nfpm config for the strixd daemon .deb. Built per-arch (run from packaging/deb):
#   stage the binary to dist/strixd, then
#   VERSION=1.1.0 ARCH=amd64 nfpm pkg -f nfpm-strixd.yaml -p deb
# nfpm templates arch:/version: from env but NOT the contents src path, so the
# binary is staged to the fixed dist/ path by the caller (see release.yml).
name: strixd
arch: ${ARCH}
version: ${VERSION}
version_schema: none
section: mail
priority: optional
maintainer: eilandert <eilander@myguard.nl>
description: |
  YARA mail-malware scanning daemon
  strixd is a Go daemon that extracts malware carriers from mail attachments
  (OLE/OOXML macros, XLM, RTF/DDE, PDF, OneNote, archives, encrypted Office)
  and scans them with a local YARA rule set plus live abuse.ch IOC feeds.
  Replaces the olefy->olevba bridge and the SpamAssassin OLEVBMacro plugin with
  a single cached daemon, integrating with rspamd, SpamAssassin and ICAP.
homepage: https://github.com/eilandert/mailstrix
license: MIT
depends:
  - libc6
  - libssl3
  - zlib1g
  - libzstd1
contents:
  - src: dist/strixd
    dst: /usr/bin/strixd
    file_info:
      mode: 0755
  - src: strixd.service
    dst: /lib/systemd/system/strixd.service
  - src: strixd.sysusers
    dst: /usr/lib/sysusers.d/strixd.conf
  - src: strixd.env
    dst: /etc/mailstrix/strixd.env
    type: config|noreplace
    file_info:
      mode: 0640
scripts:
  postinstall: postinstall.sh
  preremove: preremove.sh
